<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bahami Hasnaa — Arabic Translator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #FAFAF8; --text: #1A1A18; --accent: #B8854A; --white: #ffffff; --border: #E8E6E1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { width: 90%; max-width: 1000px; margin: 0 auto; padding: 80px 0; }
    
    /* Hero Section */
    .hero { height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; background: var(--white); border-bottom: 1px solid var(--border); }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); }
    h1 span { color: var(--accent); }
    .btn { display: inline-block; margin-top: 30px; padding: 15px 40px; background: var(--accent); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: #966b3a; transform: translateY(-3px); }

    /* Contact Form - THE FIX */
    .contact-box { background: var(--white); padding: 40px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 20px; text-align: center; }
    
    form { display: grid; gap: 15px; }
    input, textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem; }
    .submit-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    .submit-btn:hover { background: #966b3a; }

    footer { text-align: center; padding: 40px; color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>

  <section class="hero">
    <div class="container">
      <h1>Bahami <span>Hasnaa</span></h1>
      <p>Arabic Translator & AI Language Expert</p>
      <a href="#contact" class="btn">Work With Me</a>
    </div>
  </section>

  <section class="container" id="contact">
    <div class="contact-box">
      <h2>Send me an Email</h2>
      
      <form action="https://formspree.io/f/yourname@email.com" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email Address" required>
        <textarea name="message" rows="5" placeholder="Tell me about your project..." required></textarea>
        <button type="submit" class="submit-btn">Send Message Directly</button>
      </form>
      
      <p style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
        Or manually copy: <strong>yourname@email.com</strong>
      </p>
    </div>
  </section>

  <footer>
    &copy; 2026 Bahami Hasnaa. All Rights Reserved.
  </footer>

</body>
</html>
